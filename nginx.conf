server {
    listen      3000;
    listen      [::]:3000;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # security headers
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # serve hero video with byte-range support (already default in nginx, just sane caching)
    location ~* \.(mp4|webm)$ {
        expires           7d;
        add_header        Cache-Control "public, max-age=604800";
        mp4;
        mp4_buffer_size       1m;
        mp4_max_buffer_size  10m;
    }

    # long cache for fingerprintable static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2|woff)$ {
        expires    30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # short cache for HTML so updates ship fast
    location ~* \.html$ {
        expires    5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # CSS/JS — short cache (no fingerprinting in this static site)
    location ~* \.(css|js)$ {
        expires    1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA-style fallback (not strictly needed for this site, but harmless)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # block access to dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
