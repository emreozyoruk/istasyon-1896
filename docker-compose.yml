services:
  istasyon:
    build: .
    image: istasyon-1896:latest
    container_name: istasyon-1896
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
